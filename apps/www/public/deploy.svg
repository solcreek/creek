<svg xmlns="http://www.w3.org/2000/svg" width="148" height="32" viewBox="0 0 148 32" role="img" aria-label="Deploy to Creek">
  <title>Deploy to Creek</title>
  <defs>
    <linearGradient id="creek-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#080a0d"/>
    </linearGradient>
    <linearGradient id="creek-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="148" height="32" rx="6" fill="url(#creek-bg)"/>
  <rect width="148" height="32" rx="6" fill="none" stroke="#262626" stroke-width="1"/>
  <!-- Stream / creek symbol: flowing curve -->
  <g transform="translate(12, 10)">
    <path d="M0 6 C 3 2, 6 10, 9 6 C 12 2, 15 10, 18 6" stroke="url(#creek-accent)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="0" cy="6" r="1.5" fill="url(#creek-accent)"/>
  </g>
  <!-- Text -->
  <text x="38" y="20" font-family="system-ui, -apple-system, 'SF Pro Text', sans-serif" font-size="11" font-weight="500" fill="#e4e4e7" letter-spacing="0.1">
    Deploy to
  </text>
  <text x="95" y="20" font-family="system-ui, -apple-system, 'SF Pro Text', sans-serif" font-size="12" font-weight="700" fill="url(#creek-accent)" letter-spacing="0.2">
    Creek
  </text>
</svg>
