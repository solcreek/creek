name: Sync skills → solcreek/skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/skills-sync.yml'
  workflow_dispatch:

# Serialize so two concurrent pushes don't race
concurrency:
  group: skills-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v6
        with:
          path: monorepo

      - name: Checkout solcreek/skills
        uses: actions/checkout@v6
        with:
          repository: solcreek/skills
          path: skills-repo
          token: ${{ secrets.SKILLS_SYNC_TOKEN }}

      # Mirror monorepo/skills/ → skills-repo/. The monorepo's skills/
      # directory is a 1:1 mirror of the downstream repo's root (same
      # layout, same file names), so rsync with --delete is safe.
      # Preserve the downstream's .git/ directory.
      - name: Mirror contents
        run: |
          set -euo pipefail
          rsync -av --delete \
            --exclude='.git/' \
            monorepo/skills/ \
            skills-repo/

      - name: Commit and push if changed
        working-directory: skills-repo
        run: |
          set -euo pipefail
          git config user.name "creek-skills-sync[bot]"
          git config user.email "skills-sync@creek.dev"

          if git diff --quiet && git diff --quiet --staged; then
            echo "No changes to push."
            exit 0
          fi

          git add -A

          # Source the commit message from the upstream commit that
          # triggered this run, so the downstream history is
          # traceable back to the monorepo PR.
          SOURCE_SHA="${{ github.sha }}"
          SOURCE_MSG=$(cd ../monorepo && git log -1 --pretty=%B "$SOURCE_SHA" | head -1)

          git commit -m "sync: $SOURCE_MSG

          Synced from solcreek/creek@${SOURCE_SHA:0:12}
          See https://github.com/solcreek/creek/commit/${SOURCE_SHA}"

          git push origin HEAD:main
