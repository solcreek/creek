name: Publish creek

on:
  push:
    tags:
      - 'creek@*'

permissions:
  id-token: write # npm trusted publisher via OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Reads pnpm version from package.json#packageManager — specifying
      # `version:` here would conflict per pnpm/action-setup@v5 behavior.
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # `pnpm install` (not filtered) so workspace deps resolve. The
      # `creek` umbrella depends on @solcreek/cli + @solcreek/runtime via
      # `workspace:^`, which pnpm rewrites to ^X.Y.Z at publish time.
      - run: pnpm install

      # No build step — packages/creek is shipped as-is (bin.js + static
      # re-export files in /files list). pnpm publish will rewrite
      # workspace:^ to ^X.Y.Z automatically.
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/creek
