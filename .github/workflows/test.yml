name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - name: Build publishable packages
        run: pnpm --filter @solcreek/sdk --filter @solcreek/cli --filter @solcreek/runtime --filter create-creek-app --filter @solcreek/build-container build

      - name: Test
        run: pnpm test

      - name: Typecheck publishable packages
        run: pnpm --filter @solcreek/sdk --filter @solcreek/cli --filter @solcreek/runtime --filter create-creek-app typecheck
