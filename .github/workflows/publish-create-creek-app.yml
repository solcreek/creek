name: Publish create-creek-app

on:
  push:
    tags:
      - 'create-creek-app@*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-creek-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --registry https://registry.npmjs.org
