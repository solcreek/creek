name: Publish create-creek-app

on:
  push:
    tags:
      - 'create-creek-app@*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/create-creek-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Debug auth
        run: |
          echo "=== .npmrc ==="
          cat $NPM_CONFIG_USERCONFIG
          echo "=== npm whoami ==="
          npm whoami 2>&1 || true
          echo "=== npm config ==="
          npm config list

      - name: Publish
        run: npm publish --access public --provenance --loglevel verbose
