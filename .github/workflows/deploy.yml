name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Force-deploy a specific worker (or 'all')"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - all
          - control-plane
          - sandbox-api
          - sandbox-dispatch
          - dispatch-worker
          - realtime-worker
          - deploy-api
          - mcp-server
          - remote-builder
          - og-api
          - tail-worker

# Run deploys serially for safety — no concurrent prod pushes.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Filtered matrix include list — a JSON array of
      # {id, package, build_filter} — consumed by the deploy job.
      # The matrix context is not available in job-level `if:`
      # (actions/runner#1985), so per-target gating happens here.
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            control-plane:
              - 'packages/control-plane/**'
              - 'packages/sdk/**'
              - 'packages/deploy-core/**'
            sandbox-api:
              - 'packages/sandbox-api/**'
              - 'packages/sdk/**'
              - 'packages/deploy-core/**'
            sandbox-dispatch:
              - 'packages/sandbox-dispatch/**'
            dispatch-worker:
              - 'packages/dispatch-worker/**'
            realtime-worker:
              - 'packages/realtime-worker/**'
            deploy-api:
              - 'packages/deploy-api/**'
            mcp-server:
              - 'packages/mcp-server/**'
            remote-builder:
              - 'packages/remote-builder/**'
              - 'packages/build-container/**'
            og-api:
              - 'packages/og-api/**'
              - 'packages/og/**'
            tail-worker:
              - 'packages/tail-worker/**'

      - name: Compute deploy matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
          # JSON array of filter names that matched (push events).
          CHANGED: ${{ steps.filter.outputs.changes }}
        run: |
          # Full worker catalog. `id` doubles as the paths-filter name
          # and the workflow_dispatch target value.
          #
          # remote-builder uses Cloudflare Containers (Docker image push
          # to CF registry). API token needs Containers: Edit +
          # Cloudchamber: Edit in addition to Workers Scripts: Edit.
          ALL=$(cat <<'JSON'
          [
            {"id": "control-plane",    "package": "@solcreek/control-plane",    "build_filter": "--filter=@solcreek/control-plane"},
            {"id": "sandbox-api",      "package": "@solcreek/sandbox-api",      "build_filter": "--filter=@solcreek/sandbox-api"},
            {"id": "sandbox-dispatch", "package": "@solcreek/sandbox-dispatch", "build_filter": "--filter=@solcreek/sandbox-dispatch"},
            {"id": "dispatch-worker",  "package": "@solcreek/dispatch-worker",  "build_filter": "--filter=@solcreek/dispatch-worker"},
            {"id": "realtime-worker",  "package": "@solcreek/realtime-worker",  "build_filter": "--filter=@solcreek/realtime-worker"},
            {"id": "deploy-api",       "package": "@solcreek/deploy-api",       "build_filter": "--filter=@solcreek/deploy-api"},
            {"id": "mcp-server",       "package": "@solcreek/mcp-server",       "build_filter": "--filter=@solcreek/mcp-server"},
            {"id": "remote-builder",   "package": "@solcreek/remote-builder",   "build_filter": "--filter=@solcreek/build-container --filter=@solcreek/remote-builder"},
            {"id": "og-api",           "package": "@solcreek/og-api",           "build_filter": "--filter=@solcreek/og-api"},
            {"id": "tail-worker",      "package": "@solcreek/tail-worker",      "build_filter": "--filter=@solcreek/tail-worker"}
          ]
          JSON
          )
          if [ "$EVENT_NAME" = "push" ]; then
            IDS="$CHANGED"
          elif [ "$TARGET" = "all" ]; then
            IDS=$(jq -c '[.[].id]' <<<"$ALL")
          elif [ -n "$TARGET" ]; then
            IDS=$(jq -cn --arg t "$TARGET" '[$t]')
          else
            IDS='[]'
          fi
          MATRIX=$(jq -c --argjson ids "$IDS" '[.[] | select(.id as $i | $ids | index($i))]' <<<"$ALL")
          echo "targets: $IDS"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  deploy:
    needs: changes
    # An empty matrix is a workflow error — skip the job entirely when
    # nothing is targeted.
    if: ${{ needs.changes.outputs.matrix != '[]' && needs.changes.outputs.matrix != '' }}
    strategy:
      # Deploys are already serialized by the workflow-level concurrency
      # group, but keep fail-fast off so one worker's failure doesn't
      # cancel the others' in-flight deploys.
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.matrix) }}
    name: deploy (${{ matrix.id }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install
      - run: pnpm turbo build ${{ matrix.build_filter }}
      - name: Deploy
        run: pnpm --filter ${{ matrix.package }} exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
