name = "creek-control-plane"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "creek-db"
database_id = "b9fe9847-fbed-48a9-8c4d-a895289be631"
# drizzle-kit writes schema.ts migrations here; point wrangler at the
# same directory so `pnpm db:migrate:{local,remote}` picks them up
# without the default `./migrations/` fallback. Prior to this, applying
# a new migration required `wrangler d1 execute --file=drizzle/NNNN_*.sql`
# by hand.
migrations_dir = "./drizzle"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "creek-assets"

# Per-tenant log archive written by tail-worker.
# Read by /api/projects/:slug/logs (Phase 8 Step 5+).
[[r2_buckets]]
binding = "LOGS_BUCKET"
bucket_name = "creek-logs"

[[kv_namespaces]]
binding = "BUILD_STATUS"
id = "5f22449ab2094383a3c95fb80aa10fa2"

[[services]]
binding = "REMOTE_BUILDER"
service = "creek-remote-builder"

# Queue producer for web-deploy build requests
[[queues.producers]]
binding = "WEB_BUILDS"
queue = "creek-web-builds"

# CLI deploy jobs: PUT /bundle enqueues, this same worker consumes. The job
# must NOT run in the request's waitUntil — workerd cancels waitUntil ~30s
# after the response, which silently killed large-worker activations (misread
# as "activation timeout"). One message per invocation so each deploy gets the
# full consumer budget; zero batch timeout so delivery is immediate.
[[queues.producers]]
binding = "DEPLOY_JOBS"
queue = "creek-deploy-jobs"

[[queues.consumers]]
queue = "creek-deploy-jobs"
max_batch_size = 1
max_batch_timeout = 0
max_retries = 2

[vars]
CREEK_DOMAIN = "bycreek.com"
SANDBOX_API_URL = "https://sandbox-api.creek.dev"
CREEK_REALTIME_URL = "https://rt.creek.dev"
CLOUDFLARE_ZONE_ID = "3945d25240c43cad64fd4da0a1386873"
DISPATCH_NAMESPACE = "creek-user-workers"
CLOUDFLARE_ACCOUNT_ID = "2438d030ca5eae4078ce05235c766516"

# Custom domain for API
[[routes]]
pattern = "api.creek.dev"
custom_domain = true

# Stale deployment sweeper + resource cleanup (every 5 minutes)
[triggers]
crons = ["*/5 * * * *"]

# All secrets set via `wrangler secret put` — never commit secret values
# CLOUDFLARE_API_TOKEN
# BETTER_AUTH_SECRET
# BETTER_AUTH_URL
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# ENCRYPTION_KEY
